steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --platform
      - linux/amd64
      - -f
      - ${_DOCKERFILE}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:latest
      - ${_CONTEXT}

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$SHORT_SHA

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$SHORT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --set-secrets
      - DATABASE_URL=${_SECRET_DATABASE_URL}:latest,DEBUG=${_SECRET_DEBUG}:latest,FIREBASE_PROJECT_ID=${_SECRET_FIREBASE_PROJECT_ID}:latest,GCS_BUCKET_NAME=${_SECRET_GCS_BUCKET_NAME}:latest,GCS_SIGNED_URL_EXPIRATION_SECONDS=${_SECRET_GCS_SIGNED_URL_EXPIRATION_SECONDS}:latest,GOOGLE_PLACES_API_KEY=${_SECRET_GOOGLE_PLACES_API_KEY}:latest,GOOGLE_PLACES_ENDPOINT=${_SECRET_GOOGLE_PLACES_ENDPOINT}:latest,GOOGLE_PLACES_LANGUAGE_CODE=${_SECRET_GOOGLE_PLACES_LANGUAGE_CODE}:latest,GOOGLE_PLACES_REGION_CODE=${_SECRET_GOOGLE_PLACES_REGION_CODE}:latest,GOOGLE_DIRECTIONS_API_KEY=${_SECRET_GOOGLE_DIRECTIONS_API_KEY}:latest,GOOGLE_ROUTES_API_KEY=${_SECRET_GOOGLE_ROUTES_API_KEY}:latest,GOOGLE_ROUTES_ENDPOINT=${_SECRET_GOOGLE_ROUTES_ENDPOINT}:latest,GOOGLE_DIRECTIONS_ENDPOINT=${_SECRET_GOOGLE_DIRECTIONS_ENDPOINT}:latest,GOOGLE_ROUTES_CONNECT_TIMEOUT_SECONDS=${_SECRET_GOOGLE_ROUTES_CONNECT_TIMEOUT_SECONDS}:latest,GOOGLE_ROUTES_READ_TIMEOUT_SECONDS=${_SECRET_GOOGLE_ROUTES_READ_TIMEOUT_SECONDS}:latest,GEMINI_API_KEY=${_SECRET_GEMINI_API_KEY}:latest,GEMINI_API_BASE_URL=${_SECRET_GEMINI_API_BASE_URL}:latest,GEMINI_MODEL=${_SECRET_GEMINI_MODEL}:latest,GEMINI_CONNECT_TIMEOUT_SECONDS=${_SECRET_GEMINI_CONNECT_TIMEOUT_SECONDS}:latest,GEMINI_READ_TIMEOUT_SECONDS=${_SECRET_GEMINI_READ_TIMEOUT_SECONDS}:latest
      - --quiet

substitutions:
  _REGION: asia-northeast1
  _REPOSITORY: backend
  _IMAGE: api
  _SERVICE: gdgoc-backend-dev
  _DOCKERFILE: backend/Dockerfile.cloudrun
  _CONTEXT: backend
  _SECRET_DATABASE_URL: backend-database-url
  _SECRET_DEBUG: backend-debug
  _SECRET_FIREBASE_PROJECT_ID: backend-firebase-project-id
  _SECRET_GCS_BUCKET_NAME: backend-gcs-bucket-name
  _SECRET_GCS_SIGNED_URL_EXPIRATION_SECONDS: backend-gcs-signed-url-expiration-seconds
  _SECRET_GOOGLE_PLACES_API_KEY: backend-google-places-api-key
  _SECRET_GOOGLE_PLACES_ENDPOINT: backend-google-places-endpoint
  _SECRET_GOOGLE_PLACES_LANGUAGE_CODE: backend-google-places-language-code
  _SECRET_GOOGLE_PLACES_REGION_CODE: backend-google-places-region-code
  _SECRET_GOOGLE_DIRECTIONS_API_KEY: backend-google-directions-api-key
  _SECRET_GOOGLE_ROUTES_API_KEY: backend-google-routes-api-key
  _SECRET_GOOGLE_ROUTES_ENDPOINT: backend-google-routes-endpoint
  _SECRET_GOOGLE_DIRECTIONS_ENDPOINT: backend-google-directions-endpoint
  _SECRET_GOOGLE_ROUTES_CONNECT_TIMEOUT_SECONDS: backend-google-routes-connect-timeout-seconds
  _SECRET_GOOGLE_ROUTES_READ_TIMEOUT_SECONDS: backend-google-routes-read-timeout-seconds
  _SECRET_GEMINI_API_KEY: backend-gemini-api-key
  _SECRET_GEMINI_API_BASE_URL: backend-gemini-api-base-url
  _SECRET_GEMINI_MODEL: backend-gemini-model
  _SECRET_GEMINI_CONNECT_TIMEOUT_SECONDS: backend-gemini-connect-timeout-seconds
  _SECRET_GEMINI_READ_TIMEOUT_SECONDS: backend-gemini-read-timeout-seconds

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:latest
